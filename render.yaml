services:
  - type: web
    name: adaptifai-backend
    runtime: docker
    rootDir: .
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /health
    disk:
      name: adaptifai-model-cache
      mountPath: /data
      sizeGB: 20
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TRANSLATION_MODEL
        value: gpt-4o
      - key: ADAPTIFAI_OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: ADAPTIFAI_OPENAI_IMAGE_QUALITY
        value: medium
      - key: ADAPTIFAI_LOCALIZE_PIPELINE
        value: v2
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: REPLICATE_LAMA_MODEL
        value: twn39/lama:2b91ca2340801c2a5be745612356fac36a17f698354a07f48a62d564d3b3a7a0
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: VERTEX_AI_PROJECT_ID
        value: adaptif-ai-1780483603776
      - key: VERTEX_AI_LOCATION
        value: us-central1
      - key: VERTEX_GEMINI_MODEL
        value: gemini-2.5-pro
      - key: VERTEX_IMAGEN_EDIT_MODEL
        value: imagen-3.0-capability-001
      - key: VERTEX_IMAGEN_MODEL
        value: imagen-3.0-generate-002
      - key: VERTEX_IMAGEN_TIMEOUT
        value: "35"
      - key: VERTEX_IMAGEN_EDIT_STEPS
        value: "20"
      - key: ADAPTIFAI_ENABLE_VERTEX_OUTPAINT
        value: "1"
      - key: ADAPTIFAI_SMART_REFRAME_ANALYSIS_PROVIDER
        value: auto
      - key: ADAPTIFAI_SMART_REFRAME_ANALYSIS_MODEL
        value: gpt-4o
      - key: ADAPTIFAI_SMART_REFRAME_ANALYSIS_MAX_SIDE
        value: "1600"
      - key: ADAPTIFAI_SMART_REFRAME_ANALYSIS_TIMEOUT
        value: "12"
      - key: ADAPTIFAI_RESIZE_FOCUS_OCR
        value: "0"
      - key: ADAPTIFAI_TROCR_MODEL
        value: microsoft/trocr-base-printed
      - key: ADAPTIFAI_OCR_ENGINE
        value: easyocr
      - key: ADAPTIFAI_INPAINT_MODEL
        value: runwayml/stable-diffusion-inpainting
      - key: ADAPTIFAI_INPAINT_BACKEND
        value: replicate
      - key: ADAPTIFAI_LOCALIZE_V5_POLYGON
        value: "1"
      - key: ADAPTIFAI_INPAINT_MAX_SIDE
        value: "384"
      - key: ADAPTIFAI_INPAINT_STEPS
        value: "12"
      - key: ADAPTIFAI_OCR_MAX_SIDE
        value: "720"
      - key: ADAPTIFAI_OCR_BATCH_SIZE
        value: "1"
      - key: ADAPTIFAI_EASYOCR_DECODER
        value: greedy
      - key: ADAPTIFAI_MAX_ACTIVE_JOBS
        value: "1"
      - key: ADAPTIFAI_LOCALIZE_FAST_CLEANUP
        value: "1"
      - key: ADAPTIFAI_ENABLE_LOCALIZE_CLEANUP_GATE
        value: "0"
      - key: ADAPTIFAI_RESIZE_FIT
        value: cover
      - key: ADAPTIFAI_CORS_ORIGINS
        value: https://adaptifai.sasmaz.digital,https://adaptifai-five.vercel.app
      - key: HF_HOME
        value: /data/huggingface
      - key: TORCH_HOME
        value: /data/torch
      - key: EASYOCR_MODULE_PATH
        value: /data/easyocr
      - key: ADAPTIFAI_TMP_DIR
        value: /data/tmp/adaptifai
      - key: WEB_CONCURRENCY
        value: "1"
